<svg width="100%" height="230" viewBox="0 0 900 230" xmlns="http://www.w3.org/2000/svg" font-family="Fira Code, Consolas, monospace">
  <defs>
    <linearGradient id="line-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>

  <rect width="900" height="230" rx="14" fill="#0a0e1a"/>
  <rect x="1" y="1" width="898" height="228" rx="13" fill="none" stroke="#1e293b" stroke-width="2"/>

  <!-- animated connecting path -->
  <path d="M 100 110 H 800" stroke="url(#line-grad)" stroke-width="3" stroke-dasharray="700" stroke-dashoffset="700">
    <animate attributeName="stroke-dashoffset" from="700" to="0" dur="2s" begin="0.3s" fill="freeze"/>
  </path>

  <!-- Node 1 -->
  <g>
    <circle cx="100" cy="110" r="9" fill="#0a0e1a" stroke="#38bdf8" stroke-width="3" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="0.4s" dur="0.4s" fill="freeze"/>
    </circle>
    <text x="100" y="70" text-anchor="middle" fill="#f1f5f9" font-size="14" font-weight="700" opacity="0">Intern
      <animate attributeName="opacity" from="0" to="1" begin="0.6s" dur="0.4s" fill="freeze"/>
    </text>
    <text x="100" y="90" text-anchor="middle" fill="#64748b" font-size="11" opacity="0">CODOOKO
      <animate attributeName="opacity" from="0" to="1" begin="0.6s" dur="0.4s" fill="freeze"/>
    </text>
    <text x="100" y="150" text-anchor="middle" fill="#94a3b8" font-size="11" opacity="0">PHP · Laravel
      <animate attributeName="opacity" from="0" to="1" begin="0.6s" dur="0.4s" fill="freeze"/>
    </text>
    <text x="100" y="168" text-anchor="middle" fill="#475569" font-size="10" opacity="0">5th semester
      <animate attributeName="opacity" from="0" to="1" begin="0.6s" dur="0.4s" fill="freeze"/>
    </text>
  </g>

  <!-- Node 2 -->
  <g>
    <circle cx="333" cy="110" r="9" fill="#0a0e1a" stroke="#38bdf8" stroke-width="3" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="0.9s" dur="0.4s" fill="freeze"/>
    </circle>
    <text x="333" y="70" text-anchor="middle" fill="#f1f5f9" font-size="14" font-weight="700" opacity="0">Freelancer
      <animate attributeName="opacity" from="0" to="1" begin="1.1s" dur="0.4s" fill="freeze"/>
    </text>
    <text x="333" y="90" text-anchor="middle" fill="#64748b" font-size="11" opacity="0">Fiverr
      <animate attributeName="opacity" from="0" to="1" begin="1.1s" dur="0.4s" fill="freeze"/>
    </text>
    <text x="333" y="150" text-anchor="middle" fill="#94a3b8" font-size="11" opacity="0">80+ orders
      <animate attributeName="opacity" from="0" to="1" begin="1.1s" dur="0.4s" fill="freeze"/>
    </text>
    <text x="333" y="168" text-anchor="middle" fill="#475569" font-size="10" opacity="0">all 5-star
      <animate attributeName="opacity" from="0" to="1" begin="1.1s" dur="0.4s" fill="freeze"/>
    </text>
  </g>

  <!-- Node 3 -->
  <g>
    <circle cx="566" cy="110" r="9" fill="#0a0e1a" stroke="#38bdf8" stroke-width="3" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="1.4s" dur="0.4s" fill="freeze"/>
    </circle>
    <text x="566" y="70" text-anchor="middle" fill="#f1f5f9" font-size="14" font-weight="700" opacity="0">Solo Builder
      <animate attributeName="opacity" from="0" to="1" begin="1.6s" dur="0.4s" fill="freeze"/>
    </text>
    <text x="566" y="90" text-anchor="middle" fill="#64748b" font-size="11" opacity="0">Florida client
      <animate attributeName="opacity" from="0" to="1" begin="1.6s" dur="0.4s" fill="freeze"/>
    </text>
    <text x="566" y="150" text-anchor="middle" fill="#94a3b8" font-size="11" opacity="0">Real estate app
      <animate attributeName="opacity" from="0" to="1" begin="1.6s" dur="0.4s" fill="freeze"/>
    </text>
    <text x="566" y="168" text-anchor="middle" fill="#475569" font-size="10" opacity="0">~1 year, solo
      <animate attributeName="opacity" from="0" to="1" begin="1.6s" dur="0.4s" fill="freeze"/>
    </text>
  </g>

  <!-- Node 4 -->
  <g>
    <circle cx="800" cy="110" r="10" fill="#38bdf8" stroke="#e2e8f0" stroke-width="2" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="1.9s" dur="0.4s" fill="freeze"/>
    </circle>
    <text x="800" y="70" text-anchor="middle" fill="#f1f5f9" font-size="14" font-weight="700" opacity="0">Team Lead
      <animate attributeName="opacity" from="0" to="1" begin="2.1s" dur="0.4s" fill="freeze"/>
    </text>
    <text x="800" y="90" text-anchor="middle" fill="#64748b" font-size="11" opacity="0">State Listings
      <animate attributeName="opacity" from="0" to="1" begin="2.1s" dur="0.4s" fill="freeze"/>
    </text>
    <text x="800" y="150" text-anchor="middle" fill="#4ade80" font-size="11" opacity="0">E-Sign platform
      <animate attributeName="opacity" from="0" to="1" begin="2.1s" dur="0.4s" fill="freeze"/>
    </text>
    <text x="800" y="168" text-anchor="middle" fill="#475569" font-size="10" opacity="0">4 engineers · now
      <animate attributeName="opacity" from="0" to="1" begin="2.1s" dur="0.4s" fill="freeze"/>
    </text>
  </g>

  <text x="450" y="205" text-anchor="middle" fill="#334155" font-size="11">graduated BSCS · University of Central Punjab · 2024</text>
</svg>
