<svg width="100%" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg" font-family="Fira Code, Consolas, monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#131c31"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#38bdf8"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-1 0" to="1 0" dur="4s" repeatCount="indefinite"/>
    </linearGradient>
  </defs>

  <rect width="900" height="280" rx="14" fill="url(#bg)"/>
  <rect x="1" y="1" width="898" height="278" rx="13" fill="none" stroke="#1e293b" stroke-width="2"/>

  <!-- title bar -->
  <rect x="0" y="0" width="900" height="34" rx="14" fill="#0f172a"/>
  <rect x="0" y="20" width="900" height="14" fill="#0f172a"/>
  <circle cx="24" cy="17" r="6" fill="#ef4444"/>
  <circle cx="46" cy="17" r="6" fill="#eab308"/>
  <circle cx="68" cy="17" r="6" fill="#22c55e"/>
  <text x="450" y="22" text-anchor="middle" fill="#64748b" font-size="12">guest@mugheez: ~/portfolio</text>

  <!-- typed lines -->
  <g font-size="17" fill="#94a3b8">
    <text x="30" y="70" opacity="0">
      <tspan fill="#38bdf8">$</tspan> whoami
      <animate attributeName="opacity" from="0" to="1" begin="0.2s" dur="0.4s" fill="freeze"/>
    </text>

    <text x="30" y="105" opacity="0" font-size="26" font-weight="700" fill="url(#glow)">
      Mugheez Asif — Full Stack Web Developer
      <animate attributeName="opacity" from="0" to="1" begin="1s" dur="0.6s" fill="freeze"/>
    </text>

    <text x="30" y="145" opacity="0">
      <tspan fill="#38bdf8">$</tspan> cat focus.txt
      <animate attributeName="opacity" from="0" to="1" begin="2s" dur="0.4s" fill="freeze"/>
    </text>
    <text x="30" y="172" opacity="0" fill="#e2e8f0">
      PHP · Laravel · React · Bootstrap — building products end to end
      <animate attributeName="opacity" from="0" to="1" begin="2.6s" dur="0.6s" fill="freeze"/>
    </text>

    <text x="30" y="212" opacity="0">
      <tspan fill="#38bdf8">$</tspan> ./status --current
      <animate attributeName="opacity" from="0" to="1" begin="3.6s" dur="0.4s" fill="freeze"/>
    </text>
    <text x="30" y="239" opacity="0" fill="#4ade80">
      Leading a team of 4 · building an E-Signature platform from scratch
      <animate attributeName="opacity" from="0" to="1" begin="4.2s" dur="0.6s" fill="freeze"/>
    </text>

    <rect x="30" y="248" width="11" height="18" fill="#38bdf8" opacity="0">
      <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.1;0.5;0.6;1" begin="4.8s" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
